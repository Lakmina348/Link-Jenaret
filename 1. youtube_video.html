<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube ID Extractor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .output-box { border: 2px dashed #ff6600; padding: 10px; border-radius: 10px; margin-bottom: 15px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>YouTube Link to ID</h2>
    <input type="text" id="driveInput" placeholder="YouTube ලින්ක් එක මෙතැනට අලවන්න...">

    <p>ලබාගත් Video ID එක:</p>
    <div class="output-box" id="outputLink">ID එකක් තවම නැත...</div>

    <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '180', width: '100%', videoId: 'M7lc1UVf-VE' });
    }

    document.getElementById('driveInput').addEventListener('input', function() {
        let val = this.value;
        let videoId = "";

        // YouTube ලින්ක් එකෙන් ID එක වෙන් කර ගැනීම
        if (val.includes("youtube.com/watch?v=")) {
            videoId = val.split("v=")[1].split("&")[0];
        } else if (val.includes("youtu.be/")) {
            videoId = val.split("youtu.be/")[1].split("?")[0];
        }

        if (videoId) {
            document.getElementById('outputLink').innerText = videoId;
            if (player) { player.loadVideoById(videoId); }
        }
    });
</script>

</body>
</html>
