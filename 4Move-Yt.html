<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Template Generator</title>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .generator-box { background: #1e293b; max-width: 500px; width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 30px; }
        .generator-box h3 { color: #38bdf8; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: #10b981; font-weight: bold; margin-bottom: 5px; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-family: inherit; box-sizing: border-box; }
        .input-group textarea { height: 100px; resize: vertical; }
        .action-btn { width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 12px; border-radius: 10px; font-weight: 800; font-size: 1rem; cursor: pointer; text-transform: uppercase; }
        .action-btn:active { transform: scale(0.98); }
        .preview-title { color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="generator-box">
        <h3>🎬 Movie Details Generator</h3>
        
        <div class="input-group">
            <label>1. Movie Name & Year</label>
            <input type="text" id="movieName" value="Chappie (2015)">
        </div>

        <div class="input-group">
            <label>2. YouTube Video ID</label>
            <input type="text" id="youtubeId" value="lyy7y0QOK-0">
        </div>

        <div class="input-group">
            <label>3. Sinhala Description</label>
            <textarea id="sinDesc">🤖 Chappie (2015) කියන්නේ අනාගත ලෝකයක බුද්ධිය සහ හැඟීම් ඇතිවන රොබෝවෙක් ගැන කියවෙන වෙනස්ම Sci-Fi / Action චිත්‍රපටයකි.</textarea>
        </div>

        <div class="input-group">
            <label>4. English Description</label>
            <textarea id="engDesc">🤖 Chappie (2015) is a gripping Sci-Fi / Action film set in a futuristic world where an advanced police robot gains true artificial intelligence.</textarea>
        </div>

        <button class="action-btn" onclick="copyFinalCode()">📋 Copy Final HTML Code</button>
    </div>

    <div class="preview-title">Live Preview Below:</div>
    <div id="livePreviewContainer" style="width: 100%;"></div>

    <script>
        // අලුතින් එක් කළ කොටස: URL එකෙන් ID එක ලබා ගැනීම
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');
            if (idFromUrl) {
                document.getElementById('youtubeId').value = idFromUrl;
            }
            generateHTML();
        };

        function generateHTML() {
            const name = document.getElementById('movieName').value;
            const ytId = document.getElementById('youtubeId').value;
            const sin = document.getElementById('sinDesc').value;
            const eng = document.getElementById('engDesc').value;

            const finalCode = `
<div class="movie-master-card" style="max-width: 500px; margin: 20px auto; font-family: 'Inter', sans-serif; color: #cbd5e1; background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
    <strong style="color: #38bdf8; font-size: 1.2rem; display: block; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; text-transform: uppercase;">
        සාරාංශය: 🎬 ${name}
    </strong>
    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 20px; border: 1px solid #475569;">
        <iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" allowfullscreen></iframe>
    </div>
    <span style="color: #10b981; font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.95rem;">🇱🇰 සිංහල සාරාංශය</span>
    <div style="line-height: 1.8; text-align: justify; font-size: 0.9rem; margin-bottom: 20px;">${sin}</div>
    <span style="color: #10b981; font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.95rem;">🇬🇧 English Description</span>
    <div style="line-height: 1.8; text-align: justify; font-size: 0.9rem; margin-bottom: 25px;">${eng}</div>
    <button style="width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; text-transform: uppercase;">▶ දැන් නරඹන්න (WATCH NOW)</button>
</div>`;

            document.getElementById('livePreviewContainer').innerHTML = finalCode;
            return finalCode;
        }

        document.getElementById('movieName').addEventListener('input', generateHTML);
        document.getElementById('youtubeId').addEventListener('input', generateHTML);
        document.getElementById('sinDesc').addEventListener('input', generateHTML);
        document.getElementById('engDesc').addEventListener('input', generateHTML);

        function copyFinalCode() {
            const codeToCopy = generateHTML();
            navigator.clipboard.writeText(codeToCopy.trim()).then(() => {
                alert("📋 Final HTML Code copied successfully!");
            });
        }
    </script>
</body>
</html>
